<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Detalle del Proyecto</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body {

            font-family: 'Segoe UI', sans-serif;

            background:
                linear-gradient(
                    135deg,
                    #f4f7ff,
                    #eef3ff
                );

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 40px 20px;

        }

        .detalle-container {

            width: 100%;
            max-width: 1100px;

            background: white;

            border-radius: 28px;

            overflow: hidden;

            box-shadow:
                0 15px 40px rgba(0,0,0,0.08);

            animation: aparecer 0.5s ease;

        }

        @keyframes aparecer {

            from{
                opacity:0;
                transform:translateY(30px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        .detalle-img-container {

            width: 100%;
            height: 550px;

            background: #f7f9ff;

            display: flex;

            justify-content: center;
            align-items: center;

            overflow: hidden;

        }

        .detalle-img {

            width: 100%;
            height: 100%;

            object-fit: contain;

            transition: 0.4s ease;

        }

        .detalle-img:hover {

            transform: scale(1.02);

        }

        .detalle-info {

            padding: 35px;

        }

        .detalle-tag {

            display: inline-block;

            padding: 8px 15px;

            background: #eef2ff;

            color: #4f7df3;

            border-radius: 12px;

            font-size: 13px;

            font-weight: bold;

            margin-bottom: 18px;

        }

        .detalle-titulo {

            font-size: 2.2rem;

            color: #1d1d1d;

            margin-bottom: 18px;

        }

        .detalle-desc {

            color: #666;

            line-height: 1.8;

            font-size: 16px;

            margin-bottom: 30px;

        }

        .btn-volver {

            display: inline-flex;

            align-items: center;

            gap: 10px;

            padding: 14px 28px;

            background: #4f7df3;

            color: white;

            text-decoration: none;

            border-radius: 16px;

            font-weight: bold;

            transition: 0.3s ease;

        }

        .btn-volver:hover {

            background: #355fd3;

            transform: translateY(-2px);

        }

        @media (max-width: 768px) {

            .detalle-img-container {

                height: 320px;

            }

            .detalle-titulo {

                font-size: 1.7rem;

            }

            .detalle-info {

                padding: 25px;

            }

        }

    </style>

</head>

<body>

    <div class="detalle-container">

        <div class="detalle-img-container">

            <img
                id="imgProyecto"
                src=""
                alt="Proyecto"
                class="detalle-img"
            >

        </div>

        <div class="detalle-info">

            <span
                id="detalleTag"
                class="detalle-tag"
            >
                PROYECTO
            </span>

            <h1
                id="tituloProyecto"
                class="detalle-titulo"
            >
                Cargando...
            </h1>

            <p
                id="descripcionProyecto"
                class="detalle-desc"
            >
                Cargando información del proyecto...
            </p>

            <a
                href="index.html"
                class="btn-volver"
            >
                ← Volver al Portafolio
            </a>

        </div>

    </div>

    <script>

        // =========================================
        // OBTENER DATOS URL
        // =========================================

        const params =
            new URLSearchParams(window.location.search);

        const titulo =
            params.get("titulo");

        const img =
            params.get("img");

        const tipo =
            params.get("tipo") || "PROYECTO";

        const desc =
            params.get("desc") ||
            "Proyecto visual perteneciente al portafolio.";

        // =========================================
        // ELEMENTOS
        // =========================================

        const tituloProyecto =
            document.getElementById("tituloProyecto");

        const imgProyecto =
            document.getElementById("imgProyecto");

        const descripcionProyecto =
            document.getElementById("descripcionProyecto");

        const detalleTag =
            document.getElementById("detalleTag");

        // =========================================
        // VALIDAR DATOS
        // =========================================

        if (titulo && img) {

            const rutaImagen =
                decodeURIComponent(img);

            imgProyecto.src = rutaImagen;

            tituloProyecto.textContent =
                decodeURIComponent(titulo);

            descripcionProyecto.textContent =
                decodeURIComponent(desc);

            detalleTag.textContent =
                decodeURIComponent(tipo);

            // ERROR SI LA IMAGEN NO EXISTE

            imgProyecto.onerror = function () {

                this.src =
                    "assets/imgs/no-image.png";

                tituloProyecto.textContent =
                    "Imagen no encontrada";

                descripcionProyecto.textContent =
                    "La imagen del proyecto no pudo cargarse.";

            };

        } else {

            tituloProyecto.textContent =
                "Proyecto no encontrado";

            descripcionProyecto.textContent =
                "No se recibieron datos desde el portafolio.";

        }

    </script>

</body>

</html>
